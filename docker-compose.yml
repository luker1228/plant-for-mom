services:
  postgres:
    image: postgres:16-alpine
    container_name: plant-for-mom-db
    environment:
      POSTGRES_USER: plant
      POSTGRES_PASSWORD: plant
      POSTGRES_DB: plant_for_mom
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plant -d plant_for_mom"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: